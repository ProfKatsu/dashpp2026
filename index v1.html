<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prova Paulista 2026 | URE Mogi das Cruzes</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Unidade Regional de Ensino de Mogi das Cruzes</p>
        <h1>Prova Paulista 2026</h1>
      </div>
      <div class="status-pill" id="summaryPill">66 escolas</div>
    </header>

    <main>
      <section class="controls" aria-label="Filtros">
        <label class="field">
          <span>Escola</span>
          <select id="schoolSelect"></select>
        </label>

        <fieldset class="mode-group">
          <legend>Visualização</legend>
          <label><input type="radio" name="mode" value="1"> 1º bimestre</label>
          <label><input type="radio" name="mode" value="2"> 2º bimestre</label>
          <label><input type="radio" name="mode" value="compare" checked> Comparativo</label>
        </fieldset>
      </section>

      <section class="kpi-grid" aria-label="Indicadores principais">
        <article class="kpi">
          <span>Total de alunos</span>
          <strong id="kpiStudents">-</strong>
          <small id="kpiStudentsDelta"></small>
        </article>
        <article class="kpi">
          <span>Participação</span>
          <strong id="kpiParticipation">-</strong>
          <small id="kpiParticipationDelta"></small>
        </article>
        <article class="kpi">
          <span>Acertos gerais</span>
          <strong id="kpiScore">-</strong>
          <small id="kpiScoreDelta"></small>
        </article>
        <article class="kpi">
          <span>Melhor componente</span>
          <strong id="kpiBest">-</strong>
          <small id="kpiBestDelta"></small>
        </article>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 id="chartTitle">Desempenho por componente</h2>
            <p id="chartSubtitle">Comparação entre o 1º e o 2º bimestres.</p>
          </div>
          <div class="legend" id="chartLegend"></div>
        </div>
        <div id="subjectChart" class="chart" aria-label="Gráfico por componente curricular"></div>
      </section>

      <section class="panel table-panel">
        <div class="panel-header">
          <div>
            <h2>Detalhamento</h2>
            <p id="tableSubtitle">Indicadores por componente curricular.</p>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="detailHead"></thead>
            <tbody id="detailBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
